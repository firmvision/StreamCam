name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Generate native iOS code
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Find scheme name
        id: scheme
        run: |
          cd ios
          SCHEME=$(xcodebuild -list -workspace *.xcworkspace 2>/dev/null | grep -A 10 "Schemes:" | grep -v "Schemes:" | grep -v "^$" | head -1 | tr -d " ")
          echo "Found scheme: $SCHEME"
          echo "name=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build iOS archive
        run: |
          cd ios
          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme "${{ steps.scheme.outputs.name }}" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/StreamCam.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tail -30

      - name: Package IPA from archive
        run: |
          ARCHIVE="$RUNNER_TEMP/StreamCam.xcarchive"
          OUTPUT="$RUNNER_TEMP/output"
          PAYLOAD="$RUNNER_TEMP/Payload"
          mkdir -p "$OUTPUT" "$PAYLOAD"

          echo "Archive contents:"
          find "$ARCHIVE" -maxdepth 4 -type d | head -30

          APP_PATH=$(find "$ARCHIVE" -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive. Full archive tree:"
            find "$ARCHIVE" -type f | head -40
            exit 1
          fi

          cp -r "$APP_PATH" "$PAYLOAD/"
          cd "$RUNNER_TEMP"
          zip -r "$OUTPUT/StreamCam.ipa" Payload
          ls -lh "$OUTPUT/StreamCam.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamCam-iOS
          path: ${{ runner.temp }}/output/StreamCam.ipa
          retention-days: 30
