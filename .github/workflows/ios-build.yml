name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Generate native iOS code
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Find scheme name
        id: scheme
        run: |
          cd ios
          echo "=== All available schemes ==="
          xcodebuild -list -workspace *.xcworkspace 2>/dev/null
          echo "=============================="
          # The workspace name always matches the main app scheme
          # Use -d to list the directory itself, not its contents
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "Using scheme: $SCHEME"
          echo "name=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build iOS app (unsigned)
        run: |
          cd ios
          xcodebuild build \
            -workspace *.xcworkspace \
            -scheme "${{ steps.scheme.outputs.name }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            2>&1 | tail -50

      - name: Package IPA
        run: |
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          OUTPUT="$RUNNER_TEMP/output"
          PAYLOAD="$RUNNER_TEMP/Payload"
          mkdir -p "$OUTPUT" "$PAYLOAD"

          echo "=== Searching for .app in DerivedData ==="
          find "$DERIVED_DATA" -name "*.app" -type d | head -10

          # Try the standard Release-iphoneos path first
          APP_PATH=$(find "$DERIVED_DATA/Build/Products/Release-iphoneos" -maxdepth 1 -name "*.app" -type d 2>/dev/null | head -1)

          # Fall back to searching all of DerivedData, excluding test bundles
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$DERIVED_DATA" -name "*.app" -type d | grep -v "\.xctest" | grep -v "simulator" | head -1)
          fi

          echo "Found app: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found. DerivedData Build/Products:"
            find "$DERIVED_DATA/Build/Products" -maxdepth 3 | head -40
            exit 1
          fi

          cp -r "$APP_PATH" "$PAYLOAD/"
          cd "$RUNNER_TEMP"
          zip -r "$OUTPUT/StreamCam.ipa" Payload
          ls -lh "$OUTPUT/StreamCam.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamCam-iOS
          path: ${{ runner.temp }}/output/StreamCam.ipa
          retention-days: 30
