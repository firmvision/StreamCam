name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub website

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Generate native iOS code
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS archive (no code signing)
        run: |
          cd ios
          xcodebuild archive \
            -workspace StreamCam.xcworkspace \
            -scheme StreamCam \
            -configuration Release \
            -archivePath $RUNNER_TEMP/StreamCam.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty

      - name: Export IPA (unsigned)
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/StreamCam.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcpretty || true

          # Fallback: extract IPA directly from archive if export fails
          mkdir -p $RUNNER_TEMP/output
          cd $RUNNER_TEMP/StreamCam.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r *.app Payload/
          zip -r $RUNNER_TEMP/output/StreamCam.ipa Payload
          echo "IPA created successfully"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamCam-iOS
          path: ${{ runner.temp }}/output/StreamCam.ipa
          retention-days: 14
