name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Generate native iOS code
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Find scheme name
        id: scheme
        run: |
          cd ios
          echo "=== All available schemes ==="
          xcodebuild -list -workspace *.xcworkspace 2>/dev/null
          echo "=============================="
          # The workspace name always matches the main app scheme
          # Use -d to list the directory itself, not its contents
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME="${WORKSPACE%.xcworkspace}"
          echo "Using scheme: $SCHEME"
          echo "name=$SCHEME" >> $GITHUB_OUTPUT

      - name: Bundle JavaScript manually
        run: |
          npx expo export:embed \
            --platform ios \
            --entry-file index.js \
            --bundle-output "$RUNNER_TEMP/main.jsbundle" \
            --assets-dest "$RUNNER_TEMP/assets" \
            --dev false \
            --reset-cache
          echo "Bundle size: $(du -h $RUNNER_TEMP/main.jsbundle | cut -f1)"

      - name: Build iOS app (unsigned)
        run: |
          cd ios
          xcodebuild build \
            -workspace *.xcworkspace \
            -scheme "${{ steps.scheme.outputs.name }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            SKIP_BUNDLING=YES \
            2>&1 | tail -80

      - name: Inject JS bundle into .app
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos" -maxdepth 1 -name "*.app" -type d | head -1)
          echo "Injecting bundle into: $APP_PATH"
          cp "$RUNNER_TEMP/main.jsbundle" "$APP_PATH/main.jsbundle"
          if [ -d "$RUNNER_TEMP/assets" ]; then
            cp -r "$RUNNER_TEMP/assets" "$APP_PATH/assets"
          fi
          echo "✅ Bundle injected ($(du -h $APP_PATH/main.jsbundle | cut -f1))"

      - name: Package IPA
        run: |
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          OUTPUT="$RUNNER_TEMP/output"
          PAYLOAD="$RUNNER_TEMP/Payload"
          mkdir -p "$OUTPUT" "$PAYLOAD"

          echo "=== Searching for .app in DerivedData ==="
          find "$DERIVED_DATA" -name "*.app" -type d | head -10

          # Try the standard Release-iphoneos path first
          APP_PATH=$(find "$DERIVED_DATA/Build/Products/Release-iphoneos" -maxdepth 1 -name "*.app" -type d 2>/dev/null | head -1)

          # Fall back to searching all of DerivedData, excluding test bundles
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$DERIVED_DATA" -name "*.app" -type d | grep -v "\.xctest" | grep -v "simulator" | head -1)
          fi

          echo "Found app: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found. DerivedData Build/Products:"
            find "$DERIVED_DATA/Build/Products" -maxdepth 3 | head -40
            exit 1
          fi

          cp -r "$APP_PATH" "$PAYLOAD/"
          cd "$RUNNER_TEMP"
          zip -r "$OUTPUT/StreamCam.ipa" Payload
          ls -lh "$OUTPUT/StreamCam.ipa"

      - name: Verify IPA contents
        run: |
          IPA="$RUNNER_TEMP/output/StreamCam.ipa"
          INSPECT="$RUNNER_TEMP/inspect"
          mkdir -p "$INSPECT"
          unzip -q "$IPA" -d "$INSPECT"

          APP_PATH=$(find "$INSPECT/Payload" -name "*.app" -type d | head -1)
          echo "App bundle: $APP_PATH"

          echo "=== All files in .app root ==="
          ls -lh "$APP_PATH"

          if [ -f "$APP_PATH/main.jsbundle" ]; then
            echo "✅ main.jsbundle FOUND — $(du -h $APP_PATH/main.jsbundle | cut -f1)"
          else
            echo "❌ main.jsbundle MISSING"
          fi

          if [ -d "$APP_PATH/Frameworks" ]; then
            echo "✅ Frameworks dir FOUND:"
            ls "$APP_PATH/Frameworks" | head -20
          else
            echo "⚠️ Frameworks dir MISSING — checking if binary is fully static"
          fi

          echo ""
          echo "=== Dynamic libraries needed by binary ==="
          otool -L "$APP_PATH/StreamCam" | head -30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamCam-iOS
          path: ${{ runner.temp }}/output/StreamCam.ipa
          retention-days: 30
